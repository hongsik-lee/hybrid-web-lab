<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>플래너 홈 - View Project</title>
  <script type="module" crossorigin src="/hybrid-web-lab/assets/modulepreload-polyfill-B5Qt9EMX.js"></script>
  <script type="module" crossorigin src="/hybrid-web-lab/assets/main-SCJlXAYu.js"></script>
  <link rel="stylesheet" crossorigin href="/hybrid-web-lab/assets/main-CfFPQOiE.css">
</head>
<body>
    <main class="app-shell">
        <section class="phone-frame">
            <header class="topbar">
                <a class="profile-link" href="./pages/profile.html">
                    <img src="https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=120&h=120&fit=crop" alt="프로필" loading="lazy">
                </a>
                <div class="welcome">
                    <p class="hello" id="helloText">안녕하세요, 레슬리님</p>
                    <p class="date" id="todayText">오늘은 5월 11일</p>
                </div>
                <a class="search-btn" href="./pages/search.html" aria-label="검색 페이지 이동">⌕</a>
            </header>

            <a class="challenge-card" href="./pages/challenge.html">
                <div class="challenge-text">
                    <h1 id="challengeTitle">오늘의 챌린지</h1>
                    <p id="challengeDesc">오전 10시 전까지 계획을 완료하세요</p>
                    <div class="members">
                        <img src="https://images.unsplash.com/photo-1544005313-94ddf0286df2?w=60&h=60&fit=crop" alt="멤버 1" loading="lazy">
                        <img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=60&h=60&fit=crop" alt="멤버 2" loading="lazy">
                        <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=60&h=60&fit=crop" alt="멤버 3" loading="lazy">
                        <span>+4</span>
                    </div>
                </div>
                <div class="challenge-visual" aria-hidden="true">
                    <span class="orb orb-1"></span>
                    <span class="orb orb-2"></span>
                    <span class="orb orb-3"></span>
                    <span class="orb orb-4"></span>
                </div>
            </a>

            <nav class="day-strip" id="dayStrip" aria-label="요일 선택"></nav>

            <section class="plan-section">
                <div class="section-head">
                    <h2>오늘의 계획</h2>
                    <a href="./pages/plans.html">전체보기</a>
                </div>

                <div class="plan-grid" id="planGrid">
                    <article class="plan-card plan-card-main" id="mainPlanCard">
                        <span class="chip" id="mainPlanPriority">중요</span>
                        <h3 id="mainPlanTitle">주짓수 그룹 수업</h3>
                        <p id="mainPlanDate">5월 11일</p>
                        <p id="mainPlanTime">15:00 - 16:00</p>
                        <p id="mainPlanLocation">A6 강의실</p>
                        <div class="trainer">
                            <img src="https://images.unsplash.com/photo-1521119989659-a83eee488004?w=80&h=80&fit=crop" alt="트레이너" loading="lazy">
                            <span id="mainPlanTrainer">트레이너 에블린 존</span>
                        </div>
                        <div class="plan-actions">
                            <a id="mainPlanLink" href="./pages/plan-judo.html">상세 보기</a>
                            <button type="button" class="done-btn" id="mainPlanDoneBtn">완료</button>
                        </div>
                    </article>

                    <article class="plan-card plan-card-sub" id="subPlanCard">
                        <span class="chip chip-light" id="subPlanPriority">보통</span>
                        <h3 id="subPlanTitle">밸런스 훈련</h3>
                        <p id="subPlanDate">5월 13일</p>
                        <p id="subPlanTime">11:00 - 14:00</p>
                        <p id="subPlanLocation">A2 룸</p>
                        <div class="plan-actions compact">
                            <a id="subPlanLink" href="./pages/plan-balance.html">상세 보기</a>
                            <button type="button" class="done-btn" id="subPlanDoneBtn">완료</button>
                        </div>
                    </article>

                    <div class="quick-actions" role="group" aria-label="빠른 액션">
                        <button type="button" data-timer-preset="10" aria-label="10분 타이머">10m</button>
                        <button type="button" data-timer-preset="25" aria-label="25분 타이머">25m</button>
                        <button type="button" data-timer-open aria-label="사용자 타이머">⏱</button>
                        <p class="timer-state" id="timerStateText">타이머 미설정</p>
                    </div>
                </div>
            </section>

            <nav class="bottom-nav" aria-label="하단 메뉴">
                <a href="./index.html" class="active" aria-label="홈">⌂</a>
                <a href="./pages/plans.html" aria-label="일정">▦</a>
                <a href="./pages/stats.html" aria-label="통계">◔</a>
                <a href="./pages/profile.html" aria-label="프로필">◡</a>
            </nav>

            <p class="status-toast" id="statusToast" aria-live="polite"></p>
        </section>

        <section class="overlay" id="onboardingModal" aria-hidden="true">
            <article class="modal-card">
                <h2>환영합니다</h2>
                <p>시작하기 전에 이름을 알려주세요.</p>
                <form id="onboardingForm" class="inline-form">
                    <input type="text" id="onboardingNameInput" placeholder="이름 입력" required>
                    <button type="submit" class="inline-btn">시작하기</button>
                </form>
            </article>
        </section>

        <section class="overlay" id="timerModal" aria-hidden="true">
            <article class="modal-card">
                <h2>타이머 설정</h2>
                <p class="timer-view" id="timerViewText">00:00</p>
                <form id="timerForm" class="inline-form">
                    <input type="number" id="timerMinutesInput" min="1" max="180" placeholder="분 단위 입력" required>
                    <div class="button-row">
                        <button type="submit" class="inline-btn">설정</button>
                        <button type="button" class="inline-btn ghost" id="timerStartBtn">시작</button>
                        <button type="button" class="inline-btn ghost" id="timerPauseBtn">일시정지</button>
                        <button type="button" class="inline-btn ghost" id="timerResetBtn">초기화</button>
                        <button type="button" class="inline-btn ghost" id="timerCloseBtn">닫기</button>
                    </div>
                </form>
            </article>
        </section>
    </main>

    <a class="floating-home-btn" href="../../landing/index.html" aria-label="메인 화면으로 이동">메인</a>
</body>
</html>
