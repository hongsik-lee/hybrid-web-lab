<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Dashboard</title>
    <script type="module" crossorigin src="/assets/vanillaMainPage-BnBYImbT.js"></script>
    <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill-B5Qt9EMX.js">
    <link rel="modulepreload" crossorigin href="/assets/main-c2C4QTc3.js">
    <link rel="modulepreload" crossorigin href="/assets/api-faMTyQMo.js">
    <link rel="modulepreload" crossorigin href="/assets/router-BZDEbV94.js">
    <link rel="stylesheet" crossorigin href="/assets/main-yJNuZhkL.css">
    <link rel="stylesheet" crossorigin href="/assets/vanillaMainPage-CeGHmOdM.css">
  </head>
  <body>
    <header data-component="header"></header>

    <main class="dashboard-page">
      <div class="dashboard-shell">
        <section class="center-content">
          <header class="center-header">
            <div>
              <h1>Hello, Writer</h1>
              <p>오늘의 작업을 빠르게 관리해보세요.</p>
            </div>
            <button id="go-write" type="button" class="btn-primary">+ 새 글 작성</button>
          </header>

          <section class="overview-cards" aria-label="요약 정보">
            <article class="overview-card">
              <h3>총 게시글</h3>
              <strong id="total-post-count">-</strong>
              <p>현재 게시판에 등록된 글 수</p>
            </article>
            <article class="overview-card">
              <h3>최근 글</h3>
              <strong id="latest-post-title">-</strong>
              <p>가장 최근에 작성된 게시글</p>
            </article>
            <article class="overview-card">
              <h3>남은 체크리스트</h3>
              <strong id="pending-check-count">0개</strong>
              <p>오늘 처리할 작업 개수</p>
            </article>
          </section>

          <section class="recent-posts" aria-label="최근 게시글">
            <div class="section-head">
              <h2>최근 게시글</h2>
              <button id="go-post-list" type="button" class="btn-ghost">전체 보기</button>
            </div>
            <ul id="recent-post-list"></ul>
          </section>
        </section>

        <aside class="checklist-panel" aria-label="체크리스트">
          <div class="checklist-head">
            <h2>체크리스트</h2>
            <button id="add-check-btn" type="button" class="add-btn" aria-label="체크리스트 추가">+</button>
          </div>

          <form id="checklist-form" class="checklist-form">
            <input
              id="check-input"
              type="text"
              placeholder="체크리스트 항목을 입력하세요"
              maxlength="80"
            />
          </form>

          <ul id="checklist-items" class="checklist-items"></ul>
        </aside>
      </div>
    </main>

    <footer data-component="footer"></footer>

  </body>
</html>
