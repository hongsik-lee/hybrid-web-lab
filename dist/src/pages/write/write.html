<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Write Post</title>
    <script type="module" crossorigin src="/hybrid-web-lab/dist/assets/vanillaWritePage-M708Ayt4.js"></script>
    <link rel="modulepreload" crossorigin href="/hybrid-web-lab/dist/assets/modulepreload-polyfill-B5Qt9EMX.js">
    <link rel="modulepreload" crossorigin href="/hybrid-web-lab/dist/assets/main-sxBA01-w.js">
    <link rel="modulepreload" crossorigin href="/hybrid-web-lab/dist/assets/api-faMTyQMo.js">
    <link rel="modulepreload" crossorigin href="/hybrid-web-lab/dist/assets/router-DJUk3qtg.js">
    <link rel="stylesheet" crossorigin href="/hybrid-web-lab/dist/assets/main-9jo5Qh5F.css">
    <link rel="stylesheet" crossorigin href="/hybrid-web-lab/dist/assets/vanillaWritePage-BPHElohd.css">
  </head>
  <body>
    <header data-component="header"></header>
    <main class="subpage-layout page-write">
      <h1>글 작성</h1>

      <form id="write-form" class="write-form">
        <label>
          제목
          <input
            type="text"
            name="title"
            id="title"
            required
            placeholder="제목을 입력하세요"
          />
        </label>

        <label>
          내용
          <textarea
            name="content"
            id="content"
            required
            placeholder="내용을 입력하세요"
            rows="10"
          ></textarea>
        </label>

        <div class="actions">
          <button type="submit">게시하기</button>
        </div>

        <p class="form-message" aria-live="polite"></p>
      </form>
    </main>
    <footer data-component="footer"></footer>
  </body>
</html>
