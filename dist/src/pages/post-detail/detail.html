<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Post Detail</title>
    <script type="module" crossorigin src="/assets/vanillaPostDetailPage-empsTRlD.js"></script>
    <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill-B5Qt9EMX.js">
    <link rel="modulepreload" crossorigin href="/assets/main-DmE078EE.js">
    <link rel="modulepreload" crossorigin href="/assets/api-faMTyQMo.js">
    <link rel="modulepreload" crossorigin href="/assets/router-BZDEbV94.js">
    <link rel="stylesheet" crossorigin href="/assets/main-9jo5Qh5F.css">
    <link rel="stylesheet" crossorigin href="/assets/vanillaPostDetailPage-uXfwzISi.css">
  </head>
  <body>
    <header data-component="header"></header>
    <main class="subpage-layout page-detail">
      <div class="detail-header">
        <button id="back" type="button" class="btn-ghost">목록으로</button>
        <h1>글 상세</h1>
      </div>

      <article id="post-detail" class="post-detail">
        <h2 class="detail-title"></h2>
        <div class="detail-meta">
          <span class="author"></span>
          <span class="date"></span>
        </div>
        <div class="detail-content"></div>
      </article>

      <p class="detail-message" aria-live="polite"></p>

      <section class="comments" aria-label="댓글">
        <h2>댓글</h2>

        <div id="comment-list" class="comment-list"></div>

        <form id="comment-form" class="comment-form">
          <label>
            댓글 작성
            <textarea
              name="comment"
              id="comment"
              rows="4"
              required
              placeholder="댓글을 입력하세요"
            ></textarea>
          </label>

          <div class="comment-actions">
            <button type="submit" class="btn-primary">등록</button>
          </div>
        </form>
      </section>
    </main>
    <footer data-component="footer"></footer>
  </body>
</html>
