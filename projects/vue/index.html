<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vue Focus Quest</title>
</head>
<body data-page="home">
    <main class="quest-shell">
        <section class="quest-phone">
            <header class="topbar">
                <a class="avatar" href="./pages/profile.html" aria-label="프로필 페이지 이동">VQ</a>
                <div>
                    <p class="kicker">오늘의 루프</p>
                    <h1 id="heroName">안녕하세요!</h1>
                </div>
                <a class="icon-btn" href="./pages/search.html" aria-label="검색 페이지 이동">⌕</a>
            </header>

            <section class="hero-card" id="heroCard">
                <p class="kicker">FOCUS QUEST</p>
                <h2>집중을 완료하고 레벨을 올려보세요</h2>
                <p id="todayChallengeSummary">오늘 챌린지 진행 상황을 불러오는 중...</p>
                <div class="hero-stats">
                    <span id="heroLevel">Lv.1</span>
                    <span id="heroXp">XP 0</span>
                    <span id="heroCoins">코인 0</span>
                    <span id="heroStreak">연속 0일</span>
                </div>
                <div class="row">
                    <a class="ghost-link" href="./pages/challenge.html">챌린지 보기</a>
                    <button type="button" class="ghost-link" id="focusToggleBtn">포커스 모드 OFF</button>
                </div>
            </section>

            <section class="panel timer-panel">
                <div class="row between">
                    <h3>포모도로 타이머</h3>
                    <span id="timerHint">대기 중</span>
                </div>
                <p class="timer-text" id="timerText">25:00</p>
                <div class="timer-progress"><span id="timerProgress"></span></div>
                <div class="preset-row">
                    <button type="button" class="preset-btn" data-minutes="15">15분</button>
                    <button type="button" class="preset-btn" data-minutes="25">25분</button>
                    <button type="button" class="preset-btn" data-minutes="45">45분</button>
                </div>
                <div class="row">
                    <select id="timerTaskSelect" aria-label="집중할 작업 선택"></select>
                    <button type="button" id="timerStartBtn">시작</button>
                    <button type="button" id="timerPauseBtn" class="btn-soft">일시정지</button>
                    <button type="button" id="timerResetBtn" class="btn-soft">리셋</button>
                </div>
            </section>

            <section class="panel">
                <h3>퀘스트 추가</h3>
                <form id="taskCreateForm" class="task-form">
                    <input type="text" id="taskTitleInput" placeholder="예) 발표 자료 마무리" required>
                    <input type="number" id="taskMinutesInput" min="10" max="180" value="30" required>
                    <select id="taskPriorityInput">
                        <option value="high">중요</option>
                        <option value="medium" selected>보통</option>
                        <option value="low">가벼움</option>
                    </select>
                    <button type="submit">추가</button>
                </form>
            </section>

            <section class="panel">
                <div class="row between">
                    <h3>오늘의 퀘스트</h3>
                    <a href="./pages/plans.html" class="ghost-link">전체 보드</a>
                </div>
                <p class="guide">카드를 길게 드래그해 순서를 바꾸고, 좌/우로 스와이프해 정리해보세요.</p>
                <ul id="todayTaskList" class="task-list"></ul>
            </section>

            <nav class="bottom-nav" aria-label="하단 메뉴">
                <a href="./index.html" class="active">홈</a>
                <a href="./pages/plans.html">보드</a>
                <a href="./pages/stats.html">통계</a>
                <a href="./pages/profile.html">설정</a>
            </nav>
        </section>
    </main>

    <p class="status-toast" id="statusToast" aria-live="polite"></p>
    <div id="confettiLayer" aria-hidden="true"></div>

    <script type="module" src="./main-home.js"></script>
    <a class="floating-home-btn" href="../../landing/index.html" aria-label="메인 화면으로 이동">메인</a>
</body>
</html>
