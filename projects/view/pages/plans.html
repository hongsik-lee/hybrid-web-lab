<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전체 일정 - View Project</title>
    <link rel="stylesheet" href="../../../dist/projects/view/style.css">
</head>
<body>
    <main class="subpage-shell">
        <article class="subpage-card">
            <a href="../index.html" class="back-link">← 홈으로</a>
            <h1>전체 일정</h1>
            <p>저장된 일정을 확인하고 새 일정을 추가할 수 있습니다.</p>

            <form class="inline-form" id="planForm">
                <input type="text" id="planTitleInput" placeholder="일정 이름" required>
                <input type="text" id="planDayInput" placeholder="요일 (예: wed)" required>
                <input type="text" id="planTimeInput" placeholder="시간 (예: 18:00-19:00)" required>
                <input type="text" id="planLocationInput" placeholder="장소 (예: A2 룸)" required>
                <input type="text" id="planPriorityInput" placeholder="우선순위 (중요/보통)" required>
                <button type="submit" class="inline-btn">일정 추가</button>
            </form>

            <form class="inline-form hidden" id="planEditForm">
                <h2>일정 수정</h2>
                <input type="hidden" id="editPlanIdInput">
                <input type="text" id="editPlanTitleInput" placeholder="일정 이름" required>
                <input type="text" id="editPlanDayInput" placeholder="요일" required>
                <input type="text" id="editPlanTimeInput" placeholder="시간" required>
                <input type="text" id="editPlanLocationInput" placeholder="장소" required>
                <input type="text" id="editPlanPriorityInput" placeholder="우선순위" required>
                <div class="button-row">
                    <button type="submit" class="inline-btn">수정 저장</button>
                    <button type="button" class="inline-btn ghost" id="planEditCancelBtn">취소</button>
                </div>
            </form>

            <ul id="plansList"></ul>
        </article>
    </main>
    <script src="../js/main.js"></script>
</body>
</html>
