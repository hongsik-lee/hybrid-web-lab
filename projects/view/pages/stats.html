<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>통계 - View Project</title>
    <link rel="stylesheet" href="../../../dist/projects/view/style.css">
</head>
<body>
    <main class="subpage-shell">
        <article class="subpage-card stats-page">
            <a href="../index.html" class="back-link">← 홈으로</a>
            <header class="stats-hero">
                <h1>주간 통계</h1>
                <p>이번 주 계획 실행 현황을 한눈에 확인하세요.</p>
            </header>

            <section class="stats-grid" aria-label="핵심 지표">
                <article class="stats-tile">
                    <p class="tile-label">완료한 계획</p>
                    <p class="tile-value" id="statsDoneValue">0</p>
                    <p class="tile-foot" id="statsDone">완료한 계획: 0개</p>
                </article>
                <article class="stats-tile">
                    <p class="tile-label">진행 중</p>
                    <p class="tile-value" id="statsPendingValue">0</p>
                    <p class="tile-foot" id="statsPending">진행 중: 0개</p>
                </article>
                <article class="stats-tile accent">
                    <p class="tile-label">달성률</p>
                    <p class="tile-value"><span id="statsRateValue">0</span>%</p>
                    <p class="tile-foot" id="statsRate">달성률: 0%</p>
                </article>
            </section>

            <section class="stats-progress" aria-label="달성률 시각화">
                <div class="progress-head">
                    <span>주간 목표 달성</span>
                    <strong id="statsProgressLabel">0%</strong>
                </div>
                <div class="progress-track" role="presentation">
                    <div class="progress-fill" id="statsProgressFill"></div>
                </div>
            </section>

            <p><a href="./plans.html">일정 관리로 이동</a></p>
        </article>
    </main>
    <script src="../js/main.js"></script>
    <a class="floating-home-btn" href="../../../landing/index.html" aria-label="메인 화면으로 이동">메인</a>
</body>
</html>
