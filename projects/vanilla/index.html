<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대시보드 - Vanilla JS</title>
    <link rel="stylesheet" href="../../dist/projects/vanilla/style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="title">대시보드</h1>
            <nav class="nav">
                <a href="index.html" class="active">홈</a>
                <a href="board-list.html">게시판</a>
            </nav>
        </header>

        <div class="dashboard">
            <!-- Checklist Section -->
            <section class="card checklist-section">
                <div class="card-header">
                    <h2>오늘의 할 일</h2>
                    <button class="btn-add" id="addTaskBtn">+</button>
                </div>
                <div class="checklist">
                    <div class="checklist-item" data-id="1">
                        <input type="checkbox" id="task1">
                        <label for="task1">프로젝트 문서 작성 완료하기</label>
                        <button class="btn-delete">×</button>
                    </div>
                    <div class="checklist-item" data-id="2">
                        <input type="checkbox" id="task2">
                        <label for="task2">코드 변경사항 검토하기</label>
                        <button class="btn-delete">×</button>
                    </div>
                    <div class="checklist-item" data-id="3">
                        <input type="checkbox" id="task3" checked>
                        <label for="task3">개발 환경 설정하기</label>
                        <button class="btn-delete">×</button>
                    </div>
                </div>
                <div class="add-task-form" style="display: none;">
                    <input type="text" id="newTaskInput" placeholder="새로운 할 일을 입력하세요...">
                    <div class="form-actions">
                        <button class="btn-primary" id="saveTaskBtn">추가</button>
                        <button class="btn-secondary" id="cancelTaskBtn">취소</button>
                    </div>
                </div>
            </section>

            <!-- Recent Posts Section -->
            <section class="card recent-posts-section">
                <div class="card-header">
                    <h2>최근 게시글</h2>
                    <a href="board-list.html" class="view-all">전체보기 →</a>
                </div>
                <div class="posts-list">
                    <div class="post-item" data-id="1">
                        <h3>Vanilla JS 프로젝트에 오신 것을 환영합니다</h3>
                        <p>게시판 시스템의 첫 번째 게시글입니다...</p>
                        <div class="post-meta">
                            <span class="author">관리자</span>
                            <span class="date">2026-03-08</span>
                        </div>
                    </div>
                    <div class="post-item" data-id="2">
                        <h3>프로젝트 설정 가이드</h3>
                        <p>이 프로젝트를 설정하고 구성하는 방법을 알아보세요...</p>
                        <div class="post-meta">
                            <span class="author">사용자</span>
                            <span class="date">2026-03-07</span>
                        </div>
                    </div>
                    <div class="post-item" data-id="3">
                        <h3>대시보드 기능 개요</h3>
                        <p>대시보드에서 사용 가능한 다양한 기능을 살펴보세요...</p>
                        <div class="post-meta">
                            <span class="author">관리자</span>
                            <span class="date">2026-03-06</span>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Calendar Section -->
            <section class="card calendar-section">
                <div class="card-header">
                    <h2>캘린더</h2>
                    <div class="calendar-nav">
                        <button id="prevMonth">‹</button>
                        <span id="currentMonth"></span>
                        <button id="nextMonth">›</button>
                    </div>
                </div>
                <div class="calendar">
                    <div class="calendar-weekdays">
                        <div>일</div>
                        <div>월</div>
                        <div>화</div>
                        <div>수</div>
                        <div>목</div>
                        <div>금</div>
                        <div>토</div>
                    </div>
                    <div class="calendar-days" id="calendarDays"></div>
                </div>
                <div class="calendar-schedule" id="calendarSchedule">
                    <div class="calendar-schedule-head">
                        <h3 id="scheduleDateTitle">날짜를 선택하세요</h3>
                    </div>
                    <div class="calendar-schedule-form">
                        <input type="text" id="scheduleInput" placeholder="예: 팀 미팅 14:00" maxlength="80">
                        <button class="btn-primary" id="addScheduleBtn" type="button" disabled>일정 추가</button>
                    </div>
                    <ul class="calendar-schedule-list" id="scheduleList"></ul>
                </div>
                <div class="month-schedule-overview" id="monthScheduleOverview">
                    <h3>이번 달 일정 요약</h3>
                    <ul class="month-schedule-list" id="monthScheduleList"></ul>
                </div>
            </section>
        </div>
    </div>

    <script src="./js/dashboard.js"></script>
    <a class="floating-home-btn" href="../../landing/index.html" aria-label="메인 화면으로 이동">메인</a>
</body>
</html>
