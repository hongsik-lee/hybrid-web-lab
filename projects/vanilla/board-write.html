<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>글쓰기 - Vanilla JS</title>
    <link rel="stylesheet" href="../../dist/projects/vanilla/style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="title">글쓰기</h1>
            <nav class="nav">
                <a href="index.html">홈</a>
                <a href="board-list.html">게시판</a>
            </nav>
        </header>

        <div class="write-container">
            <form class="write-form" id="writeForm">
                <div class="form-group">
                    <label for="postTitle">제목</label>
                    <input type="text" id="postTitle" class="form-input" placeholder="제목을 입력하세요..." required>
                </div>

                <div class="form-group">
                    <label for="postAuthor">작성자</label>
                    <input type="text" id="postAuthor" class="form-input" placeholder="이름을 입력하세요..." required>
                </div>

                <div class="form-group">
                    <label for="postContent">내용</label>
                    <textarea id="postContent" class="form-textarea" placeholder="내용을 작성하세요..." rows="15" required></textarea>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-submit">등록</button>
                    <button type="button" class="btn-cancel" id="cancelBtn">취소</button>
                </div>
            </form>
        </div>
    </div>

    <script src="./js/board.js"></script>
    <a class="floating-home-btn" href="../../landing/index.html" aria-label="메인 화면으로 이동">메인</a>
</body>
</html>
