<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/styles/main.scss" />
    <title>Login</title>
  </head>
  <body>
    <header data-component="header"></header>
    <main class="subpage-layout page-login">
      <section class="subpage-card login-card">
        <div class="subpage-head">
          <h1>로그인</h1>
          <p>환영합니다. 계정 정보를 입력해 접속하세요.</p>
        </div>

        <form class="login-form">
          <label>
            이메일
            <input type="email" placeholder="email@example.com" />
          </label>
          <label>
            비밀번호
            <input type="password" placeholder="비밀번호를 입력하세요" />
          </label>
          <button type="button" class="btn-primary">로그인</button>
        </form>
      </section>
    </main>
    <footer data-component="footer"></footer>
    <script type="module" src="/src/main.js"></script>
    <script type="module" src="/src/pages/login/login.js"></script>
  </body>
</html>
